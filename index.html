<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- CONFIGURAÇÕES BÁSICAS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚬 Cigarros Loja</title>
    
    <!-- CARREGA CSS EXTERNO -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- CONTAINER PRINCIPAL -->
    <div class="container">
        
        <!-- HEADER COM LOGO E TÍTULO -->
        <div class="header">
            <<img src="cigarros-loja2/image-loja.jpeg" alt="Logo Loja" class="logo">

            <div>
                <h1> Distribuidora & Tabacaria</h1>
                
            </div>
        </div>
        
        <!-- FORMULÁRIO DE VENDAS -->
        <div class="form-section">
            <!-- CAMPOS DE ENTRADA -->
            <div class="form-row">
                <input id="marca" placeholder="Marca (Marlboro, Hollywood)">
                <input id="qtdpedidos" placeholder="Qtd Pedidos" type="number" min="1" value="1">
                <input id="comprador" placeholder="COMPRADOR (José, Maria)">
                <input id="preco" placeholder="R$" type="number" step="0.01">
            </div>
            
            <!-- BOTÕES DE AÇÃO -->
            <div class="form-row">
                <button onclick="addCarga()">➕ ADICIONAR VENDA</button>
                <button onclick="clearForm()" class="btn-danger">✏️ LIMPAR FORMULÁRIO</button>
                <button onclick="limparTodos()" class="btn-danger reset-btn">🗑️ LIMPAR TODAS VENDAS</button>
                <button onclick="exportData()">💾 EXTRATO DO DIA</button>
            </div>
        </div>
        
        
            <!-- TABELA VENDAS -->
            <table>
                <thead>
                    <tr>
                        <th>Marca</th>
                        <th>Qtd</th>
                        <th>Comprador</th>
                        <th>Total R$</th>
                        <th>Açôes</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <!-- VENDAS AQUI -->
                </tbody>
            </table>

            <!-- TABELA E ESTATÍSTICAS -->
        <div class="table-section">
            <!-- CARDS RESUMO -->
            <div class="stats">
                <div class="stat">
                    <div id="totalP">0</div>
                    Total Vendas
                </div>
                <div class="stat">
                    <div id="totalV">R$0</div>
                    Total Vendido
                </div>
            </div>
        </div>
    </div>
    
    <!-- CARREGA JAVASCRIPT -->
    <script src="script.js"></script>
</body>
</html>
